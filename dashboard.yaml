- type: sections
  title: Pump Controller
  icon: mdi:water-pump
  max_columns: 4
  cards: []
  show_icon_and_title: true
  sections:
  - type: grid
    column_span: 1
    background:
      color: amber
      opacity: 20
    cards:
    - type: vertical-stack
      title: Garden Pump Controller (1)
      cards:
      - type: entity
        entity: binary_sensor.garden_pump_controller_1_water_level
        name: Water Level
        state_color: true
      - type: horizontal-stack
        cards:
        - type: button
          entity: switch.garden_pump_controller_1_pump_1
          name: Pump 1
          icon: mdi:water-pump
          show_state: true
          tap_action:
            action: toggle
        - type: button
          entity: switch.garden_pump_controller_1_pump_2
          name: Pump 2
          icon: mdi:water-pump
          show_state: true
          tap_action:
            action: toggle
        - type: button
          entity: switch.garden_pump_controller_1_pump_3
          name: Pump 3
          icon: mdi:water-pump
          show_state: true
          tap_action:
            action: toggle
      - type: custom:mushroom-chips-card
        chips:
        - type: entity
          entity: sensor.garden_pump_controller_1_firmware_version
          icon: mdi:chip
          content_info: state
        - type: entity
          entity: select.garden_pump_controller_1_update_channel
          icon: mdi:cellphone-arrow-down
          content_info: state
  - type: grid
    column_span: 1
    background:
      color: amber
      opacity: 20
    cards:
    - type: vertical-stack
      title: DEV Pump Controller (77)
      cards:
      - type: entity
        entity: binary_sensor.garden_pump_controller_77_water_level
        name: Water Level
        state_color: true
      - type: horizontal-stack
        cards:
        - type: button
          entity: switch.garden_pump_controller_77_pump_1
          name: Pump 1
          icon: mdi:water-pump
          show_state: true
          tap_action:
            action: toggle
        - type: button
          entity: switch.garden_pump_controller_77_pump_2
          name: Pump 2
          icon: mdi:water-pump
          show_state: true
          tap_action:
            action: toggle
        - type: button
          entity: switch.garden_pump_controller_77_pump_3
          name: Pump 3
          icon: mdi:water-pump
          show_state: true
          tap_action:
            action: toggle
      - type: custom:mushroom-chips-card
        chips:
        - type: entity
          entity: sensor.garden_pump_controller_77_firmware_version
          icon: mdi:chip
          content_info: state
        - type: entity
          entity: select.garden_pump_controller_77_update_channel
          icon: mdi:cellphone-arrow-down
          content_info: state
