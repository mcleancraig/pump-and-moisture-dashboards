views:
- cards: []
  icon: mdi:water
  max_columns: 4
  sections:
  - cards:
    - cards:
      - cards:
        - entity: sensor.garden_moisture_sensor_1_moisture
          name:
            type: entity
          needle: false
          severity:
            green: 40
            red: 0
            yellow: 20
          type: gauge
        - entity: sensor.garden_moisture_sensor_1_battery
          name:
            type: entity
          needle: true
          severity:
            green: 40
            red: 0
            yellow: 20
          type: gauge
        type: horizontal-stack
      - entity: sensor.garden_moisture_sensor_1_last_seen
        name:
          type: entity
        type: entity
      - chips:
        - content_info: state
          entity: sensor.garden_moisture_sensor_1_firmware_version
          icon: mdi:chip
          type: entity
        - content_info: state
          entity: select.garden_moisture_sensor_1_update_channel
          icon: mdi:cellphone-arrow-down
          type: entity
        - content: '{%- set v = states(''sensor.garden_moisture_sensor_1_battery_24h_change'')
            | int(none) -%}{% if v is none or v == 0 %}→0%{% elif v < 0 %}↓{{ v |
            abs }}%{% else %}↑{{ v }}%{% endif %}'
          icon: '{%- set v = states(''sensor.garden_moisture_sensor_1_battery_24h_change'')
            | int(none) -%}{% if v is none or v == 0 %}mdi:battery-clock{% elif v
            < 0 %}mdi:trending-down{% else %}mdi:trending-up{% endif %}'
          icon_color: '{%- set v = states(''sensor.garden_moisture_sensor_1_battery_24h_change'')
            | int(none) -%}{% if v is none or v == 0 %}grey{% elif v < 0 %}red{% else
            %}green{% endif %}'
          type: template
        type: custom:mushroom-chips-card
      title: Zamioculcus (1)
      type: vertical-stack
    type: grid
