views:

  # ═══════════════════════════════════════════════════════════
  #  MOISTURE SENSORS
  #  Sensors 1–10 and 77.
  #  Card titles marked "Sensor N (N)" are placeholders — update
  #  them when the plant name is known.
  # ═══════════════════════════════════════════════════════════
  - type: sections
    title: Moisture
    icon: mdi:water
    max_columns: 4
    cards: []
    show_icon_and_title: true
    sections:

      - type: grid
        cards:
          - type: vertical-stack
            title: Zamioculcus (1)
            cards:
              - type: horizontal-stack
                cards:
                  - type: gauge
                    entity: sensor.garden_moisture_sensor_1_moisture
                    name:
                      type: entity
                    needle: false
                    severity:
                      green: 40
                      yellow: 20
                      red: 0
                  - type: gauge
                    entity: sensor.garden_moisture_sensor_1_battery
                    name:
                      type: entity
                    needle: true
                    severity:
                      green: 40
                      yellow: 20
                      red: 0
              - type: entity
                entity: sensor.garden_moisture_sensor_1_last_seen
                name:
                  type: entity
              - type: custom:mushroom-chips-card
                chips:
                  - type: entity
                    entity: sensor.garden_moisture_sensor_1_firmware_version
                    icon: mdi:chip
                    content_info: state

      - type: grid
